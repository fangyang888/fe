name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd /home/deploy/fe
            git pull origin main
            npm install
            npm run build
            cd server
            npm install
            npm run build
            cd ..
            pm2 restart fe-server
