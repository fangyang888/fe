name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [main, feat/v4]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Build Frontend
        run: |
          pnpm install
          pnpm run build

      - name: Build Backend
        run: |
          cd server
          pnpm install
          pnpm run build

      - name: Deploy to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          password: ${{ secrets.ECS_PASSWORD }}
          source: 'dist/,server/dist/,server/package.json,server/package-lock.json,ecosystem.config.cjs'
          target: '/home/deploy/fe'
          strip_components: 0

      - name: Post-deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          password: ${{ secrets.ECS_PASSWORD }}
          script: |
            echo "--- 系统信息 ---"
            cat /etc/os-release | grep PRETTY_NAME || true
            
            echo "--- 正在全盘查找 npm (可能较慢) ---"
            find / -name npm -type f -executable 2>/dev/null | grep bin | head -n 3 || echo "未找到 npm"
            
            echo "--- 正在全盘查找 pm2 ---"
            find / -name pm2 -type f -executable 2>/dev/null | grep bin | head -n 3 || echo "未找到 pm2"
            
            echo "--- 检查 Node 状态 ---"
            node -v || /usr/bin/node -v || echo "Node 也不在路径中"

            # 之前的尝试
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin
            
            # 如果你知道路径，可以在这里手动添加，例如：
            # export PATH=$PATH:/your/node/path/bin

            cd /home/deploy/fe/server
            npm install --production
            cd ..
            pm2 startOrReload ecosystem.config.cjs --env production
