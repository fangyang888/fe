name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [main, feat/v4]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Build Frontend
        run: |
          pnpm install
          pnpm run build

      - name: Build Backend
        run: |
          cd server
          pnpm install
          pnpm run build

      - name: Deploy to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          password: ${{ secrets.ECS_PASSWORD }}
          source: 'dist/,server/dist/,server/package.json,server/package-lock.json,ecosystem.config.cjs'
          target: '/home/deploy/fe'
          strip_components: 0

      - name: Post-deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          password: ${{ secrets.ECS_PASSWORD }}
          script: |
            # 调试信息
            echo "Current PATH: $PATH"
            echo "Current User: $(whoami)"
            
            echo "Searching for npm..."
            which npm || find /usr/bin /usr/local/bin -name npm 2>/dev/null || true
            
            echo "Searching for pm2..."
            which pm2 || find /usr/bin /usr/local/bin -name pm2 2>/dev/null || true

            # 强制加载环境变量
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH=$PATH:/usr/local/bin:/usr/bin:/bin

            cd /home/deploy/fe/server
            npm install --production
            cd ..
            pm2 startOrReload ecosystem.config.cjs --env production
